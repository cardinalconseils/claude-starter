  <rect x="30" y="590" width="740" height="76" fill="#161b22" rx="6"/>

  <text x="92" y="624" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#e6edf3" text-anchor="middle">113+</text>
  <text x="92" y="648" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">commands</text>

  <line x1="154" y1="604" x2="154" y2="656" stroke="#30363d" stroke-width="1"/>

  <text x="216" y="624" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#e6edf3" text-anchor="middle">141</text>
  <text x="216" y="648" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">agents</text>

  <line x1="278" y1="604" x2="278" y2="656" stroke="#30363d" stroke-width="1"/>

  <text x="339" y="624" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#e6edf3" text-anchor="middle">12</text>
  <text x="339" y="648" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">arch patterns</text>

  <line x1="402" y1="604" x2="402" y2="656" stroke="#30363d" stroke-width="1"/>

  <text x="463" y="624" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#e6edf3" text-anchor="middle">5</text>
  <text x="463" y="648" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">phases</text>

  <line x1="525" y1="604" x2="525" y2="656" stroke="#30363d" stroke-width="1"/>

  <text x="586" y="624" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#e6edf3" text-anchor="middle">4</text>
  <text x="586" y="648" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">maturity stages</text>

  <line x1="647" y1="604" x2="647" y2="656" stroke="#30363d" stroke-width="1"/>

  <text x="709" y="624" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#7c3aed" text-anchor="middle">∞</text>
  <text x="709" y="648" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">vibe sessions</text>

  <!-- ══════════════════════════════════════════════════════
       DIFFERENTIATOR
  ══════════════════════════════════════════════════════ -->
  <rect x="30" y="696" width="740" height="58" fill="#1c1435" rx="6" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="400" y="721" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#8b949e" text-anchor="middle">vs raw Claude Code · v0.dev · Lovable · Cursor · Windsurf</text>
  <text x="400" y="743" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#a78bfa" text-anchor="middle">They generate.  CKS thinks with you.</text>

  <!-- ══════════════════════════════════════════════════════
       CTA
  ══════════════════════════════════════════════════════ -->
  <rect x="30" y="784" width="740" height="20" fill="#161b22" rx="4"/>
