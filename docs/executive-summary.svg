<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 820" width="800" height="820">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1c1435;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1c1435;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2135;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="800" height="820" fill="#0d1117" rx="12"/>

  <!-- ══════════════════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="800" height="116" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="104" width="800" height="12" fill="#1c1435"/>
  <!-- purple left accent -->
  <rect x="0" y="0" width="5" height="116" fill="#7c3aed" rx="2"/>

  <text x="30" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#e6edf3">CKS — Claude Code Starter Kit</text>
  <text x="30" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-style="italic" fill="#a78bfa">"Plan slowly. Sprint automatically. Ship confidently."</text>

  <!-- badges -->
  <rect x="30" y="78" width="76" height="22" fill="#21262d" rx="11"/>
  <text x="68" y="93" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">v5.1.123</text>

  <rect x="116" y="78" width="108" height="22" fill="#21262d" rx="11"/>
  <text x="170" y="93" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Claude Code Plugin</text>

  <rect x="234" y="78" width="100" height="22" fill="#21262d" rx="11"/>
  <text x="284" y="93" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">MCP-Native</text>

  <rect x="344" y="78" width="110" height="22" fill="#21262d" rx="11"/>
  <text x="399" y="93" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Hermes-Compatible</text>

  <!-- ══════════════════════════════════════════════════════
       PROBLEM / SOLUTION
  ══════════════════════════════════════════════════════ -->
  <text x="30" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#8b949e" letter-spacing="1.5">THE PROBLEM</text>
  <rect x="30" y="152" width="740" height="58" fill="#161b22" rx="6"/>
  <rect x="30" y="152" width="4" height="58" fill="#f85149" rx="2"/>
  <text x="48" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e6edf3">Vibecoders ship fast. Raw AI tools — Cursor, v0, Lovable — generate code without thinking.</text>
  <text x="48" y="197" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8b949e">CKS is the discipline layer: senior engineering rigour, zero coding required.</text>

  <!-- ══════════════════════════════════════════════════════
       5-PHASE LIFECYCLE
  ══════════════════════════════════════════════════════ -->
  <text x="30" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#8b949e" letter-spacing="1.5">5-PHASE LIFECYCLE</text>

  <!-- Phase 1: Discover -->
  <rect x="30" y="246" width="130" height="80" fill="#161b22" rx="6" stroke="#388bfd" stroke-width="1.5"/>
  <rect x="30" y="246" width="130" height="30" fill="#0d2135" rx="6"/>
  <rect x="30" y="264" width="130" height="12" fill="#0d2135"/>
  <text x="95" y="267" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#79c0ff" text-anchor="middle">Discover</text>
  <text x="95" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Feature intent</text>
  <text x="95" y="307" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">CONTEXT.md</text>

  <text x="172" y="291" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#484f58" text-anchor="middle">›</text>

  <!-- Phase 2: Design -->
  <rect x="185" y="246" width="130" height="80" fill="#161b22" rx="6" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="185" y="246" width="130" height="30" fill="#1c1435" rx="6"/>
  <rect x="185" y="264" width="130" height="12" fill="#1c1435"/>
  <text x="250" y="267" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle">Design</text>
  <text x="250" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">UX + architecture</text>
  <text x="250" y="307" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Stitch + Impeccable</text>

  <text x="327" y="291" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#484f58" text-anchor="middle">›</text>

  <!-- Phase 3: Sprint -->
  <rect x="340" y="246" width="130" height="80" fill="#161b22" rx="6" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="340" y="246" width="130" height="30" fill="#0d2618" rx="6"/>
  <rect x="340" y="264" width="130" height="12" fill="#0d2618"/>
  <text x="405" y="267" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#56d364" text-anchor="middle">Sprint</text>
  <text x="405" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Build + test</text>
  <text x="405" y="307" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">SUMMARY.md</text>

  <text x="482" y="291" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#484f58" text-anchor="middle">›</text>

  <!-- Phase 4: Review -->
  <rect x="495" y="246" width="130" height="80" fill="#161b22" rx="6" stroke="#d29922" stroke-width="1.5"/>
  <rect x="495" y="246" width="130" height="30" fill="#271e0d" rx="6"/>
  <rect x="495" y="264" width="130" height="12" fill="#271e0d"/>
  <text x="560" y="267" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e3b341" text-anchor="middle">Review</text>
  <text x="560" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Gates + retro</text>
  <text x="560" y="307" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">VERIFICATION.md</text>

  <text x="637" y="291" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#484f58" text-anchor="middle">›</text>

  <!-- Phase 5: Release -->
  <rect x="650" y="246" width="120" height="80" fill="#161b22" rx="6" stroke="#f85149" stroke-width="1.5"/>
  <rect x="650" y="246" width="120" height="30" fill="#2d0f0d" rx="6"/>
  <rect x="650" y="264" width="120" height="12" fill="#2d0f0d"/>
  <text x="710" y="267" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ff7b72" text-anchor="middle">Release</text>
  <text x="710" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Deploy + verify</text>
  <text x="710" y="307" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Health check</text>

  <!-- ══════════════════════════════════════════════════════
       THREE PILLARS
  ══════════════════════════════════════════════════════ -->
