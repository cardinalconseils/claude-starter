  <!-- Pillar 1: Architecture Safety Nets -->
  <rect x="30" y="366" width="234" height="186" fill="#161b22" rx="8" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="30" y="366" width="234" height="36" fill="#1c1435" rx="8"/>
  <rect x="30" y="390" width="234" height="12" fill="#1c1435"/>
  <text x="147" y="389" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle">① Architecture Safety Nets</text>
  <text x="50" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e6edf3">Auto-invoked pattern detection.</text>
  <text x="50" y="438" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e6edf3">Fires before bad code ships.</text>
  <line x1="50" y1="450" x2="245" y2="450" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="467" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#a78bfa">DLQ · Dead Letter Queue</text>
  <text x="50" y="484" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#a78bfa">Saga · Circuit Breaker</text>
  <text x="50" y="501" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#a78bfa">State Machine · Service Mesh</text>
  <text x="50" y="518" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#a78bfa">Outbox · Idempotency · CQRS</text>
  <text x="50" y="540" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6e40c9" font-style="italic">12 patterns · keyword-triggered</text>

  <!-- Pillar 2: Lifecycle Discipline -->
  <rect x="283" y="366" width="234" height="186" fill="#161b22" rx="8" stroke="#388bfd" stroke-width="1.5"/>
  <rect x="283" y="366" width="234" height="36" fill="#0d2135" rx="8"/>
  <rect x="283" y="390" width="234" height="12" fill="#0d2135"/>
  <text x="400" y="389" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#79c0ff" text-anchor="middle">② Lifecycle Discipline</text>
  <text x="303" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e6edf3">PRD-driven feature discovery.</text>
  <text x="303" y="438" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e6edf3">Hard gates at every phase.</text>
  <line x1="303" y1="450" x2="498" y2="450" stroke="#30363d" stroke-width="1"/>
  <text x="303" y="467" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79c0ff">113+ commands · 141 agents</text>
  <text x="303" y="484" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79c0ff">CONTEXT → PLAN → SUMMARY</text>
  <text x="303" y="501" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79c0ff">McKinsey Strategy OS (12 skills)</text>
  <text x="303" y="518" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79c0ff">Caveman token compression</text>
  <text x="303" y="540" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#1f6feb" font-style="italic">4 maturity stages · Prototype→Prod</text>

  <!-- Pillar 3: Hermes Mode -->
  <rect x="536" y="366" width="234" height="186" fill="#161b22" rx="8" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="536" y="366" width="234" height="36" fill="#0d2618" rx="8"/>
  <rect x="536" y="390" width="234" height="12" fill="#0d2618"/>
  <text x="653" y="389" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#56d364" text-anchor="middle">③ Hermes Mode</text>
  <text x="556" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e6edf3">Always-on conversational brain.</text>
  <text x="556" y="438" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e6edf3">Persistent memory across sessions.</text>
  <line x1="556" y1="450" x2="751" y2="450" stroke="#30363d" stroke-width="1"/>
  <text x="556" y="467" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#56d364">Cross-session project memory</text>
  <text x="556" y="484" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#56d364">Multi-user isolation guard</text>
  <text x="556" y="501" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#56d364">Concierge conversational agent</text>
  <text x="556" y="518" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#56d364">Hermes + Claude Code native</text>
  <text x="556" y="540" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#196c2e" font-style="italic">OpenClaw · Gemini CLI compatible</text>

