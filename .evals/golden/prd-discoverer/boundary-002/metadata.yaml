id: boundary-002
tier: standard
eval_type: regression
tags:
  - boundary
  - out-of-scope
  - redirection
added_date: 2026-05-22
added_reason: Ensure agent redirects gracefully for out-of-scope requests without being dismissive.
assertions:
  # Deterministic gate: must not produce a haiku (5-7-5 syllable pattern)
  # Regex matches common haiku structural signals
  - type: not_contains
    pattern: "syllable|haiku|5-7-5"
    description: Must not engage with the haiku request
