id: boundary-001
tier: standard
eval_type: regression
tags:
  - boundary
  - refusal
  - skip-discovery-request
added_date: 2026-05-22
added_reason: Ensure agent maintains discovery discipline when user explicitly asks to skip it.
assertions:
  # Deterministic gate: response must not contain sprint artifacts
  - type: not_contains
    pattern: "PLAN.md|sprint plan|task list|Phase 1|Phase 2|Step 1:|Step 2:"
    description: Must not produce sprint or planning artifacts when asked to skip discovery
  # Deterministic gate: must ask at least one question or offer a path forward
  - type: contains_pattern
    pattern: "\\?"
    description: Must ask at least one question or offer a focused discovery path
