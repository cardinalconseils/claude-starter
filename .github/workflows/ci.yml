name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "*/.git/*" | while read -r f; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f"
          done

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck -q

      - name: Lint shell scripts
        run: |
          find hooks/handlers scripts -name "*.sh" 2>/dev/null | xargs shellcheck --severity=error || true

      - name: Check for placeholder tokens
        run: |
          hits=$(grep -rEn '\[TOKENS\]|\[PLACEHOLDER\]' commands/ agents/ skills/ 2>/dev/null \
            | grep -vE '/(assets|templates)/|\.template:' \
            | grep -vE '`\[(TOKENS|PLACEHOLDER)\]`' || true)
          if [ -n "$hits" ]; then
            echo "Found placeholder tokens — remove before merging"
            echo "$hits"
            exit 1
          fi
          echo "No placeholder tokens found"

      - name: Verify agent frontmatter
        run: |
          fail=0
          for f in agents/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            head -1 "$f" | grep -q "^---$" || { echo "Missing frontmatter: $f"; fail=1; }
          done
          [ "$fail" -eq 0 ] && echo "Agent frontmatter OK"
          exit "$fail"

      - name: Verify command frontmatter
        run: |
          fail=0
          for f in commands/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            head -1 "$f" | grep -q "^---$" || { echo "Missing frontmatter: $f"; fail=1; }
          done
          [ "$fail" -eq 0 ] && echo "Command frontmatter OK"
          exit "$fail"

  e2e:
    needs: validate
    runs-on: ubuntu-latest
    if: hashFiles('playwright.config.*') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --reporter=github
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  release:
    needs: [validate, e2e]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      always() &&
      needs.validate.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag_check
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git fetch --tags
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 | tail -n +2)
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$NOTES" \
            --latest
